<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>용선우</title>
    <meta name="description" content="데이터와 AI로 시장을 봅니다. 미국·국내 주식 시장 대시보드 '미르의 미국 주식'을 만들고 있습니다.">
    <link rel="canonical" href="https://seonu-dragon.github.io/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="용선우">
    <meta property="og:description" content="데이터와 AI로 시장을 봅니다.">
    <meta property="og:url" content="https://seonu-dragon.github.io/">
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --card: #1e293b;
          --text: #e2e8f0;
          --muted: #94a3b8;
          --line: #334155;
          --accent: #60a5fa;
        }
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      main { width: 100%; max-width: 520px; }
      .name {
        font-size: clamp(2rem, 7vw, 2.75rem);
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .tagline { margin-top: 6px; color: var(--muted); font-size: 1rem; }
      .links { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
      .card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s ease, transform 0.15s ease;
      }
      .card:hover { border-color: var(--accent); transform: translateY(-2px); }
      .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .card-body { flex: 1; min-width: 0; }
      .card-title { font-weight: 700; font-size: 1.05rem; }
      .card-desc { margin-top: 2px; color: var(--muted); font-size: 0.9rem; }
      .arrow { color: var(--muted); flex-shrink: 0; }
      .card:hover .arrow { color: var(--accent); }
      footer { margin-top: 32px; font-size: 0.85rem; color: var(--muted); }
      footer a { color: inherit; }
    </style>
  </head>
  <body>
    <main>
      <h1 class="name">용선우</h1>
      <p class="tagline">데이터와 AI로 시장을 봅니다.</p>

      <div class="links">
        <a class="card" href="/Mir_US_Stocks/">
          <div class="card-body">
            <div class="card-title">미르의 미국 주식</div>
            <div class="card-desc">미국·국내 시장 트리맵, 섹터 흐름, 종목 분석 대시보드</div>
          </div>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>

      <footer>
        <a href="https://github.com/seonu-dragon">GitHub</a>
      </footer>
    </main>
  </body>
</html>
